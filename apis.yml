  properties:
  - url: https://bridgedataoutput.com/docs/platform/API/bridge
    type: Documentation
  - url: openapi/bridge-interactive-openapi.yml
    type: OpenAPI
  description: Retrieve scheduled open house (RESO OpenHouse) records for a dataset,
    including date, time window, and the associated listing.
- aid: bridge-interactive:media
  name: Bridge Media API
