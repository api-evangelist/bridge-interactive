specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Bridge Interactive
providerId: bridge-interactive
created: '2026-06-21'
modified: '2026-06-21'
reconciled: false
tags:
- Real Estate
- MLS
- RESO
- Listings
- Property Data
- Rate Limiting
- Quotas
- Throttling
description: >-
  The Bridge API paginates responses and constrains result-set size rather
  than publishing a single fixed per-second request quota. The Bridge Web API
  returns paged bundles controlled by limit/offset, and the RESO Web API
  (OData) pages with $top/$skip; result sets beyond 10,000 records must use the
  Property replication endpoint for full extraction. Specific per-account
  request-rate ceilings are governed per dataset and are not reconciled in this
  artifact.
notes: >-
  Verify current pagination ceilings and any per-token request-rate limits in
  the Bridge platform documentation on reconciliation; behavior can differ
  between v2 and v3 endpoints (v3 changes $top semantics to match the OData
  spec).
sources:
- https://bridgedataoutput.com/docs/platform/API/bridge
- https://bridgedataoutput.com/docs/platform/
- https://www.bridgeinteractive.com/updated-bridge-reso-web-api-changes-coming/
responseCodes:
  throttled: 429
limits:
- name: Bridge Web API Page Size
  scope: request
  metric: records
  limit: see provider documentation
  notes: Controlled by the limit parameter with offset-based pagination.
- name: RESO Web API Page Size
  scope: request
  metric: records
  limit: see provider documentation
  notes: Controlled by $top / $skip; v3 changes $top to represent total collection size.
- name: Replication Threshold
  scope: dataset
  metric: records
  limit: 10000
  notes: Result sets larger than 10,000 records must use the Property replication endpoint.
- name: Per-Account Request Rate
  scope: account
  metric: requests
  limit: see provider documentation
  notes: Governed per dataset and access token; specific ceilings not reconciled here.
policies:
- name: Pagination
  description: Page through large result sets with limit/offset (Bridge Web API) or $top/$skip (RESO Web API).
- name: Replication
  description: Use the Property replication endpoint to synchronize datasets exceeding the 10,000-record threshold.
- name: Backoff Strategy
  description: Clients should implement exponential backoff with jitter and honor any 429 throttling responses.
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
