specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Bridge Interactive
providerId: bridge-interactive
created: '2026-06-21'
modified: '2026-06-21'
reconciled: false
tags:
- Real Estate
- MLS
- RESO
- Listings
- Property Data
- Plans
description: >-
  Bridge Interactive does not charge vendors or brokerages additional service
  fees for integrating with partner MLSs via the Bridge API; access is free if
  you qualify. Eligibility requires an MLS membership, an IDX vendor
  relationship, or an approved technology partnership. After registering, you
  apply for access to each available dataset and access is granted based on
  your specific use case. Individual MLSs may charge their own licensing fees
  at their discretion, and Zillow Group data requires separate Zillow Group
  approval. Specific dollar amounts are set by each MLS/data source and are not
  reconciled in this artifact.
notes: >-
  Access tokens are issued from the Bridge Dashboard under Data Access > API
  Access Tokens once a dataset application is approved. Zillow Group data
  requests can take 10+ business days to determine eligibility.
sources:
- https://www.bridgeinteractive.com/developers/bridge-api/
- https://www.bridgeinteractive.com/developers/zillow-group-data/
- https://bridgedataoutput.com/docs/platform/
plans:
- id: bridge-approved-access
  name: Approved Data Access
  type: free
  description: >-
    Free Bridge API access for qualified entities (MLS members, IDX vendors,
    approved technology partners) after per-dataset application and approval.
    Bridge charges no additional vendor/brokerage service fee.
  entries:
  - label: Bridge API Access
    name: bridge_api_access
    type: free
    metric: requests
    limit: -1
    timeFrame: month
    geo: global
    unit: 1
    price: free if qualified (no Bridge vendor fee)
    userMultiplied: false
  elements:
  - name: Listings and Properties
  - name: Agents
  - name: Offices
  - name: Open Houses
  - name: Media
  - name: RESO Web API
- id: bridge-mls-licensing
  name: MLS Licensing
  type: usage
  description: >-
    Individual MLSs may charge their own licensing fees, at their discretion,
    for access to their dataset through the Bridge platform. Terms are set by
    each MLS, not by Bridge Interactive.
  entries:
  - label: MLS Dataset License
    name: mls_dataset_license
    type: flat
    metric: contract
    limit: -1
    timeFrame: year
    geo: global
    unit: 1
    price: set by each MLS (contact the MLS / data source)
    userMultiplied: false
  elements:
  - name: Per-MLS Dataset Access
- id: bridge-zillow-group-data
  name: Zillow Group Data
  type: enterprise
  description: >-
    Access to Zillow Group datasets through Bridge requires separate approval
    from Zillow Group. Applied for the same way as MLS datasets; eligibility
    review can take 10+ business days.
  entries:
  - label: Zillow Group Data Access
    name: zillow_group_data
    type: flat
    metric: contract
    limit: -1
    timeFrame: year
    geo: global
    unit: 1
    price: by approval (contact Zillow Group)
    userMultiplied: false
  elements:
  - name: Zillow Group Datasets
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
