meters:
- name: dataset_entitlements
  description: Number of approved datasets a token can access; primary allocation unit.
  unit: datasets
  aggregation: sum
  dimensions:
  - account
  - dataset
- name: api_requests
  description: API calls made per dataset/token; useful for operational visibility though not directly billed by Bridge.
  unit: requests
  aggregation: sum
  dimensions:
  - account
  - dataset
  - api
- name: replication_records
  description: Records pulled via the Property replication endpoint for full dataset synchronization.
  unit: records
  aggregation: sum
  dimensions:
  - account
  - dataset
- name: mls_license_fees
  description: Licensing fees charged by individual MLSs at their discretion for dataset access.
  unit: usd
  aggregation: sum
  dimensions:
  - account
  - dataset
principles:
- name: Visibility
  description: Track which datasets each access token is entitled to and monitor request and replication volume per dataset.
- name: Allocation
  description: Use one access token per dataset/workload so MLS licensing costs and usage map cleanly to internal cost centers.
- name: Optimization
  description: Use $select/fields to trim payloads and the replication endpoint for bulk sync; request only the datasets and feed types (e.g. IDX) actually needed.
- name: Accountability
  description: Assign owners per MLS/Zillow Group data agreement and review licensing terms and entitlements against business need.
