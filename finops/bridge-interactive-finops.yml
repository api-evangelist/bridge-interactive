alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Bridge Interactive
serviceCategory: Analytics and Data
billingModel:
  pricingCategory: Other
  billingFrequency: Contractual
  billingCurrency: USD
  chargeCategories:
  - Purchase
  - Usage
focusColumns:
  ServiceName: Bridge API
  ServiceCategory: Analytics and Data
  ProviderName: Bridge Interactive
  PublisherName: Bridge Interactive
  InvoiceIssuerName: MLS or Zillow Group (per data agreement)
  BillingCurrency: USD
  ChargeCategory: Purchase
