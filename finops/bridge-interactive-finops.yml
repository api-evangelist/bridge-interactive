description: >-
  FinOps view of Bridge API consumption. Bridge Interactive does not charge
  vendors or brokerages a service fee for API access; cost exposure instead
  comes from per-MLS licensing fees (set by each MLS at its discretion) and
  from approval-gated Zillow Group data agreements. Because Bridge's own
  metering is access/approval-based rather than usage-priced, FinOps attention
  focuses on dataset entitlements, replication/egress volume, and contractual
  licensing terms rather than per-request unit prices.
notes: >-
  Bridge does not publish usage-based unit pricing; per-MLS and Zillow Group
  fees are contractual and must be reconciled against the relevant data
  agreements. Treat dataset access tokens as the primary cost-allocation
  boundary.
